<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V-DASH ARENA Games</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>"
    />
    <style>
      body {
        font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
        background: #fafaf7;
        color: #222;
        margin: 0;
        padding: 48px 20px;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
      }
      h1 {
        font-size: 28px;
        letter-spacing: -0.02em;
        margin: 0 0 4px;
      }
      p.sub {
        color: #888;
        margin: 0 0 32px;
        font-size: 14px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
      }
      a.card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 20px;
        background: #fff;
        border: 1px solid #ececec;
        border-radius: 14px;
        text-decoration: none;
        color: #222;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      a.card:hover {
        border-color: #ddd;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      }
      .name {
        font-weight: 600;
      }
      .arrow {
        color: #bbb;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>V-DASH ARENA Games</h1>
      <p class="sub">能力アップ訓練用ゲーム集</p>
      <ul>
        <li>
          <a class="card" href="./processing-speed/"
            ><span class="name">認知処理速度トレーナー</span
            ><span class="arrow">→</span></a
          >
        </li>
        <li>
          <a class="card" href="./cyber-defender/"
            ><span class="name">Cyber Defender</span
            ><span class="arrow">→</span></a
          >
        </li>
        <li>
          <a class="card" href="./executive-function-lab/"
            ><span class="name">Executive Function Interventions Lab</span
            ><span class="arrow">→</span></a
          >
        </li>
        <li>
          <a class="card" href="./atodashi-janken/"
            ><span class="name">後出しじゃんけん脳トレ</span
            ><span class="arrow">→</span></a
          >
        </li>
        <li>
          <a class="card" href="./abekobe-flag/"
            ><span class="name">あべこべ旗揚げトレーニング</span
            ><span class="arrow">→</span></a
          >
        </li>
        <li>
          <a class="card" href="./puzmon-lab/"
            ><span class="name">コトバとカタチの冒険：パズモン・ラボ</span
            ><span class="arrow">→</span></a
          >
        </li>
        <li>
          <a class="card" href="./spot-difference/"
            ><span class="name">間違い探しゲーム</span
            ><span class="arrow">→</span></a
          >
        </li>
        <li>
          <a class="card" href="./kantan-invader/"
            ><span class="name">かんたんインベーダー</span
            ><span class="arrow">→</span></a
          >
        </li>
        <li>
          <a class="card" href="./karada-genki/"
            ><span class="name">からだ元氣！まねっこゲーム</span
            ><span class="arrow">→</span></a
          >
        </li>
      </ul>
    </div>
  </body>
</html>
